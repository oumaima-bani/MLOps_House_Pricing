version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: ./api/Dockerfile
    container_name: house-api
    ports:
      - "8000:8000"
    # Optional: mount for hot reload if you want to edit code without rebuilding
    volumes:
      - ./api:/app
    command: uvicorn FastAPI:app --host 0.0.0.0 --port 8000 --reload

  streamlit:
    build:
      context: .
      dockerfile: ./streamlit/Dockerfile.streamlit
    container_name: house-ui
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000/predict
    depends_on:
      - api
    # Optional: mount for hot reload
    volumes:
      - ./streamlit:/app
    command: streamlit run app_streamlit.py --server.port=8501 --server.address=0.0.0.0
